apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-test
  labels:
    app: test
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test
      env: test
  template:
    metadata:
      labels:
        app: test
        env: test
    spec:
      containers:
      - name: test
        image: docker.io/sivanext/finalsemproject:latest
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
