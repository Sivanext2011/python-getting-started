apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-prod
  labels:
    app: test
    env: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test
      env: prod
  template:
    metadata:
      labels:
        app: test
        env: prod
    spec:
      containers:
      - name: test
        image: docker.io/sivanext/finalsemproject:latest
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
